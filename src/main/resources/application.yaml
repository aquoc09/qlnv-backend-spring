server:
  port: ${PORT:8080}
  servlet:
    context-path: /qlnv-spring

spring:
  datasource:
    url: ${DB_URL}
    driver-class-name: "com.mysql.cj.jdbc.Driver"
    username: ${DB_USER}root
    password: ${DB_PASS}root
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
jwt:
  signerKey: ${JWT_KEY}
#  valid-duration: 5 #seconds
#  refreshable-duration: 120 #seconds
